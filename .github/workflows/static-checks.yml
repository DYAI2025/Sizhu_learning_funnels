name: Static checks

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate Wu Xing page
        run: python tests/validate_wu_xing_page.py
