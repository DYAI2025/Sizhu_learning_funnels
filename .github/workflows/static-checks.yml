name: Static checks

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate Wu Xing page
        run: python tests/validate_wu_xing_page.py
      - name: Build Docker image
        run: docker build -t sizhu-learning:test .
      - name: Run Docker image
        run: |
          docker run -d --name sizhu-learning -p 8080:8080 sizhu-learning:test
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs sizhu-learning
          exit 1
      - name: Verify public routes
        run: |
          curl --fail --silent http://127.0.0.1:8080/learn/wu-xing/ >/dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8080/)" = "302"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8080/does-not-exist)" = "404"
      - name: Stop Docker container
        if: always()
        run: docker rm -f sizhu-learning || true
